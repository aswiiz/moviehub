<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOVIE HUB - Premium Movie Streaming</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">MOVIE HUB</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for movies, series...">
                <button onclick="searchMovies()">Search</button>
            </div>
        </header>

        <div id="highlights-section" class="highlights-container hidden">
            <h2>✨ Trending Now</h2>
            <div id="highlights-grid" class="highlights-grid"></div>
        </div>

        <main>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Searching for movies...</p>
            </div>

            <div id="results-container" class="hidden">
                <table id="resultsTable">
                    <thead>
                        <tr>
                            <th>Poster</th>
                            <th>Details</th>
                            <th>Download</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <!-- Results will be injected here -->
                    </tbody>
                </table>
            </div>

            <div id="no-results" class="hidden">
                <i class="fas fa-film"></i>
                <p>No movies found. Try another search!</p>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 MOVIE HUB - All Rights Reserved</p>
            <div style="margin-top: 10px;">
                <a href="/admin"
                    style="color: var(--accent); text-decoration: none; font-size: 0.8rem; opacity: 0.6;">Admin
                    Login</a>
            </div>
        </footer>
    </div>
    <script src="/static/script.js"></script>
</body>

</html>
